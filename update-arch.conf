# update-arch configuration
#
# Holds two kinds of settings:
#   1. Upstream coordinates — where the tool looks for new releases.
#      Forking this project? Point these at your fork and the installer /
#      --update flow follow along.
#   2. Runtime tunables — per-module behaviors (e.g. how often to refresh
#      the mirrorlist).
#
# Users may override this file by creating
#   $XDG_CONFIG_HOME/update-arch/update-arch.conf
# (typically ~/.config/update-arch/update-arch.conf). The user file is
# sourced after this one and wins. Per-run env-var overrides win over both.

# ---------------------------------------------------------------------------
# Upstream coordinates
# ---------------------------------------------------------------------------
REPO_OWNER="aaronsb"
REPO_NAME="arch-update"

# Update channel:
#   "tag"    - follow the latest released tag (recommended)
#   "branch" - track the tip of a branch (for rolling / dev installs)
UPDATE_CHANNEL="tag"

# Branch to track when UPDATE_CHANNEL="branch".
UPDATE_BRANCH="main"

# ---------------------------------------------------------------------------
# Module tunables
# ---------------------------------------------------------------------------

# Days between mirrorlist refreshes (03-mirrors-update). Reflector probes
# mirror download rates, which is slow and bandwidth-heavy; mirror quality
# changes on the order of weeks, not hours.
#   0 disables throttling (refresh every run)
# Per-run bypass: UPDATE_ARCH_FORCE_MIRRORS=1 update-arch --run
# Per-run override: UPDATE_ARCH_MIRRORS_INTERVAL_DAYS=N update-arch --run
MIRRORS_INTERVAL_DAYS=30

# ---------------------------------------------------------------------------
# Terminal preferences
# ---------------------------------------------------------------------------
# Written by `update-arch --configure-terminal` into the user override file
# at $XDG_CONFIG_HOME/update-arch/update-arch.conf. The defaults below take
# effect when no user override is set.
#
#   PREFERRED_TERMINAL  - "auto" (autodetect) or e.g. "vscode", "kitty",
#                         "alacritty", "wezterm", "iterm2"
#   FORCE_ASCII_ICONS   - "true" forces plain ASCII icons (no Nerd Font)
#   DETECTED_TERMINAL   - filled by detection; informational only
#   LAST_DETECTION_TIME - epoch seconds; redetect after 30 days
PREFERRED_TERMINAL="auto"
FORCE_ASCII_ICONS="false"
